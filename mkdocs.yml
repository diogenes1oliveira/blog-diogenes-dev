site_name: Dodge's Blog
site_description: A blog about programming, data engineering and even more random stuff
site_url: https://blog.diogenes.dev/

docs_dir: docs

nav:
  - Home: index.md
  - Posts:
      - Index: posts/index.md
      - O Surto - The Mother Of All Nightmares: posts/001-o-surto-the-mother-of-all-nightmares.md
  - Dev & AI stuff:
      - Development:
          - Home: dev/index.md
          - Setup: dev/SETUP.md
          - Chat History: dev/CHATs.md
          - Protocol: dev/PROTOCOL.md
          - Agents Guide: dev/AGENTS.md
          - LLM Parameters: dev/LLM-PARAMs.md
      - CI/CD:
          - Home: ci/index.md
          - Deployment Checklist: ci/DEPLOYMENT.md

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - tables
