site_name: Διογένης's Blog
site_description: A blog about programming, data engineering and even more random stuff
site_url: https://blog.diogenes.dev/

docs_dir: docs

# nav:
#   - Home: index.md
#   - Posts: posts/
#   - Dev & AI stuff:
#       - Development:
#           - Home: dev/index.md
#           - Setup: dev/SETUP.md
#           - Chat History: dev/CHATS.md
#           - Protocol: dev/PROTOCOL.md
#           - Agents Guide: dev/AGENTS.md
#           - LLM Parameters: dev/LLM-PARAMS.md
#       - CI/CD:
#           - Home: ci/index.md
#           - Deployment Checklist: ci/DEPLOYMENT.md

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.footer
    # - navigation.expand
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

plugins:
  - blog
  - search
  - section-index
  - privacy
  - tags
  - awesome-nav
  - htmlproofer:
      enabled: !ENV [CI, false]
      raise_error: true # Fail build on broken links
  - gen-files:
      scripts:
        - src/mkdocs_customize/gen_pages.py
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - assets/mermaid-init.js
  - assets/feedback.js

extra_css:
  - assets/extra.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - mdx_outline
